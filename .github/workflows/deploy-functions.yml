name: Deploy Firebase Functions

on:
  push:
    branches: ["main"]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Write functions .env file
        # firebase deploy в non-interactive режим не може да прочете defineString params
        # (SMTP_HOST/SMTP_PORT) без локален .env.<project-id> файл — CI checkout-ът няма
        # такъв (правилно е .gitignore-нат), затова го генерираме тук от GitHub Actions
        # secrets. ВАЖНО: ANTHROPIC_API_KEY/SMTP_USER/SMTP_PASS са defineSecret params —
        # стойността им живее само в Secret Manager (firebase functions:secrets:set).
        # Слагането им и в .env файла кара Cloud Run да гърми с "Secret environment
        # variable overlaps non secret environment variable", затова тук НЕ участват.
        working-directory: functions
        run: |
          cat > .env.after-care-treatment <<EOF
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          EOF
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}

      - name: Debug token (safe, no leak)
        run: echo "Token length is ${#FIREBASE_TOKEN} characters"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase
        run: npx firebase-tools@13.29.1 deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
