name: Deploy Firebase Functions

on:
  push:
    branches: ["main"]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Debug token (safe, no leak)
        run: echo "Token length is ${#FIREBASE_TOKEN} characters"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Firebase
        run: npx firebase-tools@13.29.1 deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
